<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment - Kopyra</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
  padding:20px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.back{
  background:rgba(255,255,255,0.1);
  border:none;
  color:#fff;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
}

.searchBox{
  display:flex;
  overflow:hidden;
  border-radius:12px;
  background:rgba(255,255,255,0.12);
  margin-bottom:20px;
}

.searchBox input{
  flex:1;
  padding:12px;
  border:none;
  outline:none;
  background:transparent;
  color:#fff;
}

.searchBox button{
  padding:12px 16px;
  border:none;
  background:#2563eb;
  color:#fff;
  cursor:pointer;
}

/* BILL */
.bill{
  background:rgba(255,255,255,0.08);
  padding:18px;
  border-radius:16px;
  margin-top:10px;
}

.row{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
}

.badge{
  padding:5px 10px;
  border-radius:999px;
  font-size:12px;
}
.logoRow{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:10px;
}

.logoImg{
  width:45px;
  height:45px;
  min-width:45px;
  max-width:45px;

  min-height:45px;
  max-height:45px;

  border-radius:12px;
  object-fit:cover;
}

.logoText{
  font-size:22px;
  font-weight:800;
}

.tag{
  font-size:12px;
  opacity:0.7;
}
.pending{background:#f59e0b33;color:#fbbf24}
.accepted{background:#2563eb33;color:#60a5fa}
.completed{background:#22c55e33;color:#4ade80}
.delivered{background:#10b98133;color:#34d399}
.rejected{background:#ef444433;color:#f87171}

.subject{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
  padding:6px 0;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.total{
  font-size:18px;
  font-weight:700;
  margin-top:10px;
}

.pay{
  margin-top:15px;
  padding:12px;
  background:#16a34a;
  border:none;
  color:#fff;
  border-radius:12px;
  width:100%;
  font-weight:700;
}

.small{
  font-size:12px;
  opacity:0.7;
  margin-top:10px;
  text-align:center;
}

.logo{
  font-size:22px;
  font-weight:800;
  text-align:center;
  margin-bottom:5px;
}

.tag{
  font-size:12px;
  text-align:center;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="top">
  <button class="back" onclick="history.back()">← Back</button>
  <div>Payment</div>
</div>

<div class="searchBox">
  <input id="tokenInput" placeholder="Enter Token Number">
  <button onclick="search()">🔍</button>
</div>

<div id="result"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
function formatDate(timestamp){
  if(!timestamp) return "-";
  
  const date = new Date(timestamp);
  
  const day = date.getDate();
  const month = date.toLocaleString('en-IN', { month: 'short' });
  const year = date.getFullYear();
  
  let hours = date.getHours();
  const minutes = date.getMinutes();
  const ampm = hours >= 12 ? 'PM' : 'AM';
  
  hours = hours % 12;
  hours = hours ? hours : 12; // 0 should be 12
  
  const mins = minutes < 10 ? '0' + minutes : minutes;
  
  return `${day} ${month} ${year}, ${hours}:${mins} ${ampm}`;
}
const firebaseConfig = {
    apiKey: "AIzaSyDuM6XcepcHyOiewj8zdnaB-6D8X2SWMM0",
    authDomain: "kopyra-34598.firebaseapp.com",
    databaseURL: "https://kopyra-34598-default-rtdb.firebaseio.com",
    projectId: "kopyra-34598"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentData = null;

/* SEARCH */
function search(){
  const token = document.getElementById("tokenInput").value.trim();
  if(!token) return;

  db.ref("Bookings/" + token).on("value", snap=>{
    const data = snap.val();
    const box = document.getElementById("result");

    if(!data){
      box.innerHTML = "<div class='bill'>No order found</div>";
      return;
    }

    currentData = data;

    let status = data.status || "Waiting";

   let extra = Number(data.extraCharges || 0);

let total = Number(data.totalAmount || 0);

let amountSet = total > 0;

let advance = Number(data.advanceAmount || 0);

let final = Number(data.finalAmount || 0);

    let subjectList = data.subjects || [];
    /* VISIBILITY CONTROLS */

let showAdvance = false;
let showExtra = false;
let showUpi = false;
let showDate = false;

/* OWNER NOT SEEN */
if(!data.seenByOwner){

  status = "Waiting";

}

/* ACCEPTED + AMOUNT SET */
if(status === "Accepted" && amountSet){

  showAdvance = true;
  showUpi = true;
  showDate = true;

}

/* COMPLETED + AMOUNT SET */
if(status === "Completed" && amountSet){

  showAdvance = true;
  showExtra = true;
  showUpi = true;
  showDate = true;

}

  /* ================= LOGIC FIX ================= */

let message = "";
let showTotal = true;
let payText = "Pay Via Your UPI Application";

/* ACCEPTED + AMOUNT SET */
if(status === "Accepted" && amountSet){

  message = "📄 Bill is ready, proceed to advance payment";

  payText = "Payment via your UPI app";

}

/* ACCEPTED + AMOUNT NOT SET */
else if(status === "Accepted" && !amountSet){

  message = "📄 Your advance bill will be generated after amount set";

  showTotal = false;

  showAdvance = false;
  showExtra = false;
  showUpi = false;
  showDate = false;

}

/* COMPLETED + AMOUNT NOT SET */
else if(status === "Completed" && !amountSet){

  message = "⏳ Your bill will be generated after amount set";

  showTotal = false;

  showAdvance = false;
  showExtra = false;
  showUpi = false;
  showDate = false;

}

/* COMPLETED + AMOUNT SET */
else if(status === "Completed" && amountSet){

  message = "💰 Bill is ready, proceed to final payment";

  showAdvance = true;
  showExtra = true;
  showUpi = true;
  showDate = true;

}

/* WAITING */
else if(status === "Waiting"){

  message = "⏳ Waiting for owner to see your request.";

  showTotal = false;

}

/* PENDING */
else if(status === "Pending"){

  message = "⏳ Very soon you will get your pending payment bill.";

  showTotal = false;

}

/* REJECTED */
else if(status === "Rejected"){
      message = `
<div style="
position:relative;
height:120px;
display:flex;
align-items:center;
justify-content:center;
">

<div style="
position:absolute;
transform:rotate(-18deg);
border:5px solid #ef4444;
color:#ef4444;
padding:12px 28px;
font-size:28px;
font-weight:800;
border-radius:12px;
opacity:0.9;
">
REJECTED
</div>

</div>
`;
      showTotal = false;
    }
   else if(status === "Delivered"){

  message = "🎉 Thank you for using Kopyra!";

  showTotal = false;

  showAdvance = false;
  showExtra = false;
  showUpi = false;
  showDate = false;

}

    /* ================= UI ================= */

    box.innerHTML = `
      <div class="bill">

      <div class="logoRow">

  <img
    src="Kopyro.jpeg"
    class="logoImg"
  >

  <div>
    <div class="logoText">KOPYRA</div>
    <div class="tag">Assignments made easy</div>
  </div>

</div>

<h3 style="margin-top:10px">
  ${data.customerName || "Customer"}
</h3>

<div class="row">
  <span>Token</span>
  <span>${token}</span>
</div>

<div class="row">
  <span>Status</span>

  <span class="badge ${status.toLowerCase()}">
    ${status}
  </span>
</div>

<p style="margin:10px 0">
  ${message}
</p>

<hr style="opacity:0.2">

<h4>Subjects</h4>

${(subjectList || []).map((item, index)=>`
  <div class="subject">
    <span>${item.name || `Subject ${index+1}`}</span>
    <span>${amountSet ? `₹${item.price || 0}` : "--"}</span>
  </div>
`).join("")}

<div class="row">

  <span>Advance (50%)</span>

  <span>
    ${showAdvance ? `₹${advance}` : "--"}
  </span>

</div>

${
showExtra
? `
<div class="row">

  <span>Extra Charges</span>

  <span>₹${extra}</span>

</div>
`
: ""
}

${showTotal ? `

  <div class="total">

    Total Payable:

    ₹${status === "Accepted" ? advance : final}

  </div>

` : ""}

${
(status === "Accepted" || status === "Completed")
? `

<div class="row">

  <span>Date</span>

  <span>

    ${
  showDate
  ? (
      status === "Accepted"
      ? (data.advancePaymentDateTime ? formatDate(data.advancePaymentDateTime) : "-")
      : (data.finalPaymentDateTime ? formatDate(data.finalPaymentDateTime) : "-")
    )
  : "--"
}

  </span>

</div>

`
: ""
}

<hr style="opacity:0.2">

<div class="row">

  <span>UPI ID</span>

  <span>
    ${showUpi ? (data.upiId || "not set") : "--"}
  </span>

</div>

<div style="
margin-top:10px;
color:#ef4444;
font-weight:700;
text-align:center;
">
We also take cash payments
</div>

${
(
(status === "Accepted" && amountSet) ||
(status === "Completed" && amountSet)
)
? `<button class="pay">${payText}</button>`
: ""
}

       
    `;
  });
}
</script>

</body>
</html>
