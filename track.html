<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Order - Kopyra</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
html, body{
  width:100%;
  overflow-x:hidden;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
  min-height:100vh;
  padding:20px;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.back{
  background:rgba(255,255,255,0.1);
  border:none;
  color:#fff;
  padding:10px 14px;
  border-radius:10px;
}
.progress-wrap{
  display:flex;
  justify-content:space-between;
  margin-top:15px;
  gap:15px;
}

/* LEFT LINE */
.progress-line{
  position:relative;
  width:40px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.line{
  position:absolute;
  width:4px;
  height:100%;
  background:rgba(255,255,255,0.15);
  border-radius:10px;
}

.fill{
  position:absolute;
  width:4px;
  background:#22c55e;
  border-radius:10px;
  transition:height 0.6s ease;
  top:0;
}

/* STEPS */
.step{
  width:14px;
  height:14px;
  border-radius:50%;
  background:rgba(255,255,255,0.2);
  margin:25px 0;
  z-index:2;
  transition:0.3s;
}

.step.active{
  background:#22c55e;
  box-shadow:0 0 10px #22c55e;
}

/* RIGHT PERCENT */
.percent-box{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:flex-end;
  min-width:80px;
}

.percent{
  font-size:26px;
  font-weight:700;
  color:#22c55e;
}

.percent small{
  font-size:12px;
  opacity:0.7;
}
/* SEARCH */
.searchBox{
  display:flex;
  margin-bottom:15px;
  border-radius:12px;
  overflow:hidden;
  background:rgba(255,255,255,0.12);
}

.searchBox input{
  flex:1;
  padding:12px;
  border:none;
  outline:none;
  background:transparent;
  color:#fff;
}

.searchBtn{
  padding:0 16px;
  border:none;
  background:#2563eb;
  color:#fff;
  cursor:pointer;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.08);
  padding:18px;
  border-radius:16px;
  margin-top:15px;
}

/* STATUS */
.status{
  margin-top:10px;
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  font-weight:600;
}

.pending{background:#f59e0b33;color:#fbbf24}
.accepted{background:#2563eb33;color:#60a5fa}
.rejected{background:#ef444433;color:#f87171}
.completed{background:#22c55e33;color:#4ade80}
.delivered{background:#10b98133;color:#34d399}

/* REVIEW */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal{
  background:#0f172a;
  padding:20px;
  border-radius:16px;
  width:90%;
  max-width:400px;
}

/* ⭐ STAR RATING */
.stars{
  font-size:28px;
  margin:10px 0;
  cursor:pointer;
  text-align:center;
}

.stars span{
  color:#fbbf24;
  transition:0.2s;
}

.stars span.active{
  color:#facc15;
  transform:scale(1.2);
}

textarea{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:none;
  outline:none;
}

.submit{
  margin-top:10px;
  background:#22c55e;
  border:none;
  padding:10px;
  border-radius:10px;
  color:#fff;
}
</style>
</head>

<body>

<div class="top">
  <button class="back" onclick="history.back()">← Back</button>
  <div>Track Order</div>
</div>

<div class="searchBox">
  <input id="tokenInput" placeholder="Enter Token Number">
  <button class="searchBtn" onclick="searchOrder()">🔍</button>
</div>

<div id="result"></div>

<!-- REVIEW -->
<div class="overlay" id="reviewBox">
  <div class="modal">
    <h3>Give Review</h3>

    <!-- STAR RATING -->
    <div class="stars" id="stars">
      <span onclick="setRating(1)">☆</span>
      <span onclick="setRating(2)">☆</span>
      <span onclick="setRating(3)">☆</span>
      <span onclick="setRating(4)">☆</span>
      <span onclick="setRating(5)">☆</span>
    </div>

    <textarea id="reviewText" placeholder="Write your review..."></textarea>
    <button class="submit" onclick="sendReview()">Submit</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "kopyra-34598.firebaseapp.com",
  databaseURL: "https://kopyra-34598-default-rtdb.firebaseio.com",
  projectId: "kopyra-34598"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentToken = "";
let selectedRating = 0;

/* SEARCH ORDER */
function searchOrder(){
  const token = document.getElementById("tokenInput").value.trim();
  if(!token) return;

  currentToken = token;

  db.ref("Bookings/" + token).on("value", snap=>{
    const data = snap.val();
    const box = document.getElementById("result");

    if(!data){
      box.innerHTML = "<div class='card'>No Order Found</div>";
      return;
    }

    let st = data.status || "Pending";
    let progress = getPercent(st);

    // ✅ CLEAN HTML ONLY
    box.innerHTML = `
      <div class="card" style="display:flex;justify-content:space-between;align-items:center;gap:15px;">

        <!-- LEFT -->
        <div>
          <h3>${data.customerName || "Customer"}</h3>
          <p>Token: ${token}</p>
          <div class="status ${st.toLowerCase()}">${st}</div>
        </div>

        <!-- RIGHT PROGRESS -->
        <div style="display:flex;flex-direction:column;align-items:center;">

          <div style="height:120px;width:6px;background:rgba(255,255,255,0.2);border-radius:10px;position:relative;overflow:hidden;">
            <div id="fillBar" style="
              position:absolute;
              bottom:0;
              width:100%;
              height:0%;
              background:linear-gradient(180deg,#22c55e,#2563eb);
              border-radius:10px;
              transition:height 0.8s ease;
            "></div>
          </div>

          <div style="margin-top:8px;font-size:13px;font-weight:600;">
            ${progress}%
          </div>

        </div>

      </div>
    `;

    // ✅ SMOOTH ANIMATION (FIXED PLACE)
    setTimeout(() => {
      const fill = document.getElementById("fillBar");
      if(fill){
        fill.style.height = progress + "%";
      }
    }, 100);

    /* AUTO REVIEW */
    if(st.toLowerCase() === "delivered" && !data.review){
      document.getElementById("reviewBox").style.display="flex";
    }
  });
}

/* ⭐ STAR RATING */
function setRating(n){
  selectedRating = n;

  const stars = document.querySelectorAll("#stars span");

  stars.forEach((s,i)=>{
    if(i < n){
      s.classList.add("active");
      s.innerHTML = "★";
    } else {
      s.classList.remove("active");
      s.innerHTML = "☆";
    }
  });
}

/* SEND REVIEW */
function sendReview(){
  const text = document.getElementById("reviewText").value.trim();
  if(!text || selectedRating === 0) return;

  db.ref("Bookings/" + currentToken + "/review").set({
    text:text,
    rating:selectedRating,
    time:Date.now()
  });

  document.getElementById("reviewBox").style.display="none";
  alert("Review submitted!");
}

/* STATUS → PERCENT */
function getPercent(status){
  switch(status){
    case "Accepted": return 25;
    case "Pending": return 50;
    case "Completed": return 75;
    case "Delivered": return 100;
    case "Rejected": return 0;
    default: return 10;
  }
}
</script>

</body>
</html>
