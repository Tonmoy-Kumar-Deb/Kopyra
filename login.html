<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kopyra Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#312e81);
}

/* APP SCREEN CARD */
.app{
    width:340px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:30px 20px;
    text-align:center;
    color:white;
    box-shadow:0 0 40px rgba(0,0,0,0.4);
    animation:fadeIn 1s ease;
}

/* LOGO */
.logo{
    width:70px;
    height:70px;
    border-radius:20px;
    margin-bottom:15px;
    box-shadow:0 0 20px rgba(255,255,255,0.2);
}

/* TITLE */
h2{
    font-size:22px;
    letter-spacing:2px;
}

.subtitle{
    font-size:13px;
    opacity:0.7;
    margin-bottom:20px;
}

/* INPUTS */
.input{
    width:100%;
    margin:10px 0;
    position:relative;
}

input{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:12px;
    background:rgba(255,255,255,0.15);
    color:white;
    font-size:14px;
}

input::placeholder{
    color:#cbd5e1;
}

/* BUTTONS */
button{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:12px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.signup{
    background:#22c55e;
    color:white;
}

.login{
    background:#3b82f6;
    color:white;
}

button:hover{
    transform:scale(1.03);
}

/* MESSAGE */
#msg{
    margin-top:12px;
    font-size:13px;
    min-height:18px;
    opacity:0.9;
}

/* LOADING */
.loading{
    display:none;
    margin-top:10px;
    font-size:13px;
    opacity:0.8;
}

/* ANIMATION */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="app">

    <img src="logo.jpg" class="logo">

    <h2>KOPYRA</h2>
    <div class="subtitle">Assignments Made Easy</div>

    <div class="input">
        <input type="email" id="email" placeholder="Email">
    </div>

    <div class="input">
        <input type="password" id="password" placeholder="Password">
    </div>

    <button class="signup" onclick="signup()">Create Account</button>
    <button class="login" onclick="login()">Login</button>

    <div id="msg"></div>
    <div class="loading" id="loading">Please wait...</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyDuM6XcepcHyOiewj8zdnaB-6D8X2SWMM0",
    authDomain: "kopyra-34598.firebaseapp.com",
    databaseURL: "https://kopyra-34598-default-rtdb.firebaseio.com",
    projectId: "kopyra-34598"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const msg = document.getElementById("msg");
const loading = document.getElementById("loading");

/* SIGNUP */
window.signup = function(){
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    loading.style.display = "block";

    createUserWithEmailAndPassword(auth, email, pass)
    .then(() => {
        loading.style.display = "none";
        msg.innerText = "Account created ✔";
    })
    .catch(() => {
        loading.style.display = "none";
        msg.innerText = "Signup failed";
    });
}

/* LOGIN */
window.login = function(){
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    loading.style.display = "block";

    signInWithEmailAndPassword(auth, email, pass)
    .then(() => {
        window.location.href = "home.html";
    })
    .catch(() => {
        loading.style.display = "none";
        msg.innerText = "Invalid login";
    });
}
</script>

</body>
      </html>
